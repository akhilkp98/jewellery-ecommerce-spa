<header class="bg-[#0B1C2C] text-white shadow-lg sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

    <div class="flex items-center justify-between h-16">

      <!-- Logo -->
      <div class="flex items-center gap-2">
        <lucide-icon [img]="Gem" class="w-8 h-8 text-[#D4AF37]"></lucide-icon>
        <h1 class="text-xl sm:text-2xl text-[#D4AF37] font-semibold">
          LUXE JEWELS
        </h1>
      </div>

      <!-- Desktop Nav -->
      <nav class="hidden md:flex items-center gap-8">
        <a *ngFor="let item of navItems"
           href="#"
           (click)="handleNavClick($event, item)"
           class="hover:text-[#D4AF37] transition-colors capitalize">
          {{ item }}
        </a>
      </nav>

      <!-- Desktop Actions -->
      <div class="hidden md:flex items-center gap-4">
        <button (click)="handleSearch()" class="p-2 hover:text-[#D4AF37]">
          <lucide-icon [img]="Search" class="w-5 h-5"></lucide-icon>
        </button>
        <button (click)="handleCart()" class="p-2 hover:text-[#D4AF37] cursor-pointer">
          <lucide-icon [img]="ShoppingBag" class="w-5 h-5"></lucide-icon>
        </button>
        <button *ngIf="authService.isLoggedIn$ | async" (click)="confirmLogout()" class="flex items-center gap-1.5 p-2 hover:text-red-400 cursor-pointer transition-colors" title="Logout">
          <lucide-icon [img]="LogOut" class="w-5 h-5"></lucide-icon>
          <span class="text-sm font-medium">Logout</span>
        </button>
      </div>

      <!-- Mobile Menu Button -->
      <button class="md:hidden p-2" (click)="toggleMenu()">
        <lucide-icon *ngIf="!isMenuOpen" [img]="Menu" class="w-6 h-6"></lucide-icon>
        <lucide-icon *ngIf="isMenuOpen" [img]="X" class="w-6 h-6"></lucide-icon>
      </button>

    </div>

    <!-- Mobile Menu -->
    <div *ngIf="isMenuOpen" class="md:hidden mt-2 pb-4 space-y-3">

      <a *ngFor="let item of navItems"
         href="#"
         (click)="handleNavClick($event, item)"
         class="block px-2 py-2 hover:text-[#D4AF37] capitalize">
        {{ item }}
      </a>

      <div class="flex gap-4 px-2 pt-2 border-t border-gray-700">
        <button (click)="handleSearch()" class="p-2 hover:text-[#D4AF37]">
          <lucide-icon [img]="Search" class="w-5 h-5"></lucide-icon>
        </button>
        <button (click)="handleCart()" class="p-2 hover:text-[#D4AF37] cursor-pointer">
          <lucide-icon [img]="ShoppingBag" class="w-5 h-5"></lucide-icon>
        </button>
        <button *ngIf="authService.isLoggedIn$ | async" (click)="confirmLogout()" class="flex items-center gap-1.5 p-2 hover:text-red-400 cursor-pointer transition-colors" title="Logout">
          <lucide-icon [img]="LogOut" class="w-5 h-5"></lucide-icon>
          <span class="text-sm font-medium">Logout</span>
        </button>
      </div>

    </div>

  </div>
</header>

<!-- Logout Confirmation Modal -->
<div *ngIf="showLogoutModal" class="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4 transition-opacity" (click)="cancelLogout()">
  <div class="bg-white rounded-lg shadow-xl max-w-sm w-full p-6 animate-in fade-in zoom-in-95 duration-200" (click)="$event.stopPropagation()">
    <h3 class="text-xl font-semibold text-[#0B1C2C] mb-2">Confirm Logout</h3>
    <p class="text-gray-600 mb-6 text-sm">Are you sure you want to log out of your account?</p>
    
    <div class="flex items-center justify-end gap-3">
      <button (click)="cancelLogout()" class="px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 rounded-md transition-colors cursor-pointer">
        Cancel
      </button>
      <button (click)="executeLogout()" class="px-4 py-2 text-sm font-medium bg-red-500 text-white rounded-md hover:bg-red-600 transition-colors cursor-pointer flex items-center gap-2">
        <lucide-icon [img]="LogOut" class="w-4 h-4"></lucide-icon>
        Logout
      </button>
    </div>
  </div>
</div>
