<div *ngIf="loaderService.isLoading$ | async" class="fixed inset-0 bg-black/40 z-[9999] flex items-center justify-center backdrop-blur-[1px]">
  <div class="bg-white p-6 rounded-xl shadow-2xl flex flex-col items-center gap-4 min-w-[160px]">
    <div class="relative w-12 h-12">
      <div class="absolute inset-0 border-4 border-[#D4AF37]/20 rounded-full"></div>
      <div class="absolute inset-0 border-4 border-t-[#D4AF37] border-r-transparent border-b-transparent border-l-transparent rounded-full animate-spin"></div>
    </div>
    <span class="text-[#0B1C2C] font-medium tracking-wide animate-pulse">Loading...</span>
  </div>
</div>
